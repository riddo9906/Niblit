name: "🧠 Nibblebot: AIOS Research Scanner"

on:
  schedule:
    - cron: "0 8 * * 2"  # Every Tuesday at 08:00 UTC
  workflow_dispatch:
    inputs:
      topics:
        description: "Comma-separated topics to research"
        required: false
        default: ""
      dry_run:
        description: "Dry run (print issue instead of creating it)"
        required: false
        default: "false"
        type: boolean

permissions:
  issues: write
  contents: read

concurrency:
  group: nibblebot-aios-research-${{ github.ref }}
  cancel-in-progress: false

jobs:
  research:
    name: Run AIOS Research Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run AIOS research bot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          AIOS_TOPICS: ${{ inputs.topics || '' }}
          AIOS_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          GITHUB_MODELS_TOKEN: ${{ secrets.GITHUB_MODELS_TOKEN || secrets.GITHUB_TOKEN }}
          USE_GH_MODEL_REPORTS: ${{ vars.USE_GH_MODEL_REPORTS || 'false' }}
        run: python nibblebots/aios_research_bot.py

      - name: Emit structured governance output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from nibblebots.workflow_governance_helpers import build_workflow_output

          payload = build_workflow_output(
            workflow_name="nibblebot-aios-research",
            findings=["research_scan_completed"],
            proposals=["review_research_findings"],
            governance_impact="low",
            schema_impact="low",
            runtime_impact="medium",
            federation_impact="low",
            confidence=0.73,
          )
          Path("workflow-governance-output.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          print(json.dumps(payload, indent=2))
          PY

      - name: Upload structured output
        uses: actions/upload-artifact@v7
        with:
          name: nibblebot-aios-research-governance-output
          path: workflow-governance-output.json
          retention-days: 14
