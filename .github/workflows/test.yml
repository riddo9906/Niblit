name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install runtime dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install dev/test dependencies
        run: pip install -r requirements-dev.txt

      - name: Syntax check — every .py file must parse cleanly
        run: |
          python - <<'EOF'
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if d not in ['.git', '__pycache__', 'node_modules', '.venv', 'venv']]
              for f in files:
                  if f.endswith('.py'):
                      path = os.path.join(root, f)
                      try:
                          with open(path) as fh:
                              ast.parse(fh.read())
                      except SyntaxError as e:
                          errors.append(f'{path}: {e}')
          if errors:
              for e in errors:
                  print(e)
              sys.exit(1)
          print(f'All Python files parse cleanly')
          EOF

      - name: Smoke import — NiblitCore must be importable
        env:
          FLASK_ENV: testing
          HF_TOKEN: test-token
        run: python -c "from niblit_core import NiblitCore; print('NiblitCore import: OK')"

      - name: Run unit tests with coverage
        env:
          FLASK_ENV: testing
          HF_TOKEN: test-token
        run: |
          pytest \
            test_server.py \
            test_niblit_db.py \
            test_main.py \
            test_termux_wakelock.py \
            test_agentic_workflows.py \
            test_reflect.py \
            test_evolve.py \
            test_autonomous_engine.py \
            test_niblit_brain.py \
            test_niblit_router.py \
            --cov=server \
            --cov=niblit_sqlite_db \
            --cov=config \
            --cov=main \
            --cov=modules.agentic_workflows \
            --cov=modules.reflect \
            --cov=modules.evolve \
            --cov=modules.autonomous_learning_engine \
            --cov=modules.termux_wakelock \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            -v

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 14

