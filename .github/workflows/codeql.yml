# CodeQL Advanced — static analysis for Swift
#
# Python is handled by GitHub's Default Code Scanning setup (enabled in repo
# settings). Running a custom advanced workflow for Python alongside Default
# Setup causes the error:
#   "CodeQL analyses from advanced configurations cannot be processed when
#    the default setup is enabled"
# So this workflow covers only Swift, which Default Setup cannot analyse.
#
# Swift   : build-mode "manual" → CodeQL autobuild cannot discover the Swift
#           Package (it's under nodes/swift/, not at the repo root). We run
#           `swift build` explicitly so CodeQL can trace the full build.
#
# Runners : Swift MUST run on macos-latest
#           (CryptoKit and Foundation are Apple platform frameworks).
#
# Schedule: Runs weekly in addition to every push/PR to main so new CVEs are
#           caught even when the codebase is quiet.

name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # 04:17 UTC every Sunday — offset from the hour to spread GitHub load
    - cron: "17 4 * * 0"

jobs:
  analyze:
    name: Analyze (swift)
    # Swift requires macOS (CryptoKit, Foundation).
    runs-on: macos-latest
    timeout-minutes: 60

    permissions:
      # Required for CodeQL to read source and write results
      actions: read
      contents: read
      security-events: write

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── CodeQL init ─────────────────────────────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual
          # Enable all default security queries plus the security-extended suite
          # for deeper vulnerability coverage.
          queries: security-extended,security-and-quality

      # ── Manual Swift build ───────────────────────────────────────────────────
      # build-mode "manual" is required because our Package.swift lives under
      # nodes/swift/ rather than the repo root; CodeQL's autobuild
      # (swift-autobuilder) only looks at the repo root and would fail with
      # "no-project-found".  We provide the explicit build steps below.
      - name: Build Swift package (CodeQL trace)
        working-directory: nodes/swift
        run: |
          swift package resolve
          swift build -c release

      # ── CodeQL analyse ──────────────────────────────────────────────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
          # Upload SARIF results even when the build step fails so we always get
          # partial results rather than a silent failure.
          upload: always
