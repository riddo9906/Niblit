# CodeQL Advanced — static analysis for Python and Swift
#
# Python  : build-mode "none"  → interpreted; no compilation step needed.
# Swift   : build-mode "manual" → CodeQL autobuild cannot discover the Swift
#           Package (it's under nodes/swift/, not at the repo root). We run
#           `swift build` explicitly so CodeQL can trace the full build.
#
# Runners : Python on ubuntu-latest; Swift MUST run on macos-latest
#           (CryptoKit and Foundation are Apple platform frameworks).
#
# Schedule: Runs weekly in addition to every push/PR to main so new CVEs are
#           caught even when the codebase is quiet.

name: "CodeQL Advanced"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    # 04:17 UTC every Sunday — offset from the hour to spread GitHub load
    - cron: "17 4 * * 0"

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    # Swift must run on macOS; Python runs fine on ubuntu-latest.
    runs-on: ${{ matrix.language == 'swift' && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: 60

    permissions:
      # Required for CodeQL to read source and write results
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Python ─────────────────────────────────────────────────────────
          - language: python
            build-mode: none

          # ── Swift ──────────────────────────────────────────────────────────
          # build-mode "manual" is required because our Package.swift lives
          # under nodes/swift/ rather than the repo root; CodeQL's autobuild
          # (swift-autobuilder) only looks at the repo root and would fail with
          # "no-project-found".  We provide the explicit build steps below.
          - language: swift
            build-mode: manual

    steps:
      # ── Checkout ────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Xcode version pin (Swift only) ──────────────────────────────────────
      # Ensure a known-good Xcode / Swift toolchain is selected before we
      # initialise the CodeQL database so the traced build uses the same tools.
      - name: Select Xcode (Swift only)
        if: matrix.language == 'swift'
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      # ── CodeQL init ─────────────────────────────────────────────────────────
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Enable all default security queries plus the security-extended suite
          # for deeper vulnerability coverage.
          queries: security-extended,security-and-quality

      # ── Manual Swift build ───────────────────────────────────────────────────
      # Only executed when build-mode is "manual" (i.e. the Swift matrix row).
      # We resolve dependencies first so the build is traceable and the CodeQL
      # extractor can see all resolved source files.
      - name: Build Swift package (CodeQL trace)
        if: matrix.build-mode == 'manual'
        working-directory: nodes/swift
        run: |
          swift package resolve
          swift build -c release

      # ── CodeQL analyse ──────────────────────────────────────────────────────
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
          # Upload SARIF results even when the build step fails so we always get
          # partial results rather than a silent failure.
          upload: always
