name: "🤖 Nibblebot: Improvement Scanner"

# Runs weekly like Dependabot — studies top GitHub repos and compares
# patterns with Niblit, then opens (or updates) a GitHub Issue with
# actionable improvement suggestions.

on:
  schedule:
    # Every Monday at 07:00 UTC (right after Dependabot runs at 06:00)
    - cron: "0 7 * * 1"
  workflow_dispatch:
    inputs:
      topics:
        description: "Comma-separated topics to study"
        required: false
        default: "ai-agent,llm-framework"
      dry_run:
        description: "Dry run (print issue instead of creating it)"
        required: false
        default: "false"
        type: boolean

permissions:
  issues: write
  contents: read

concurrency:
  group: nibblebot-improve-${{ github.ref }}
  cancel-in-progress: false

jobs:
  improve:
    name: Run Nibblebot Improvement Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run Nibblebot improvement scan
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          NIBBLEBOT_TOPICS: ${{ inputs.topics || 'ai-agent,llm-framework' }}
          NIBBLEBOT_DRY_RUN: ${{ inputs.dry_run || 'false' }}
        run: python nibblebots/improvement_bot.py

      - name: Emit structured governance output
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from nibblebots.workflow_governance_helpers import build_workflow_output

          payload = build_workflow_output(
            workflow_name="nibblebot-improve",
            findings=["improvement_scan_completed"],
            proposals=["review_generated_improvement_issue"],
            governance_impact="medium",
            schema_impact="low",
            runtime_impact="medium",
            federation_impact="low",
            confidence=0.75,
          )
          Path("workflow-governance-output.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          print(json.dumps(payload, indent=2))
          PY

      - name: Upload structured output
        uses: actions/upload-artifact@v7
        with:
          name: nibblebot-improve-governance-output
          path: workflow-governance-output.json
          retention-days: 14
