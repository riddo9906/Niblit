name: "🧬 Niblit: Autonomous Evolution Agent"

# The unified code-evolution agent.  On every run it:
#   1. Scans EVERY Python file in the repository.
#   2. Detects ONE safe, incremental improvement (highest-priority fix type
#      with the most instances in a single file).
#   3. Applies the fix, validates it with py_compile, and commits directly
#      to the target branch.
#
# This agent combines the capabilities of all individual nibblebots into a
# single autonomous loop that continuously improves the codebase over time.
#
# Fix catalogue (priority order):
#   1. bare_except       — `except:` → `except Exception:`
#   2. bare_except_pass  — annotate silent `except … pass` with noqa: BLE001
#   3. eof_newline       — ensure every file ends with a single newline
#
# Schedule:
#   • Daily at 03:00 UTC — keeps the codebase improving steadily without
#     flooding the commit history.
#   • Manual dispatch (workflow_dispatch) for on-demand runs.
#
# Permissions:
#   • contents: write  — required to push the improvement commit.
#   • issues: write    — reserved for future issue-creation fallback.
#
# Secrets / variables:
#   • GITHUB_TOKEN is the default Actions token (no extra secrets needed).
#   • Optionally set EVOLUTION_BOT_TOKEN to a PAT if branch protection rules
#     prevent the default token from pushing to the protected branch.

on:
  schedule:
    - cron: "0 3 * * *"    # Daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      fix_type:
        description: >
          Force a specific fix type.
          Options: bare_except | bare_except_pass | eof_newline | auto
        required: false
        default: "auto"
      dry_run:
        description: "Dry run — print the proposed change without committing"
        required: false
        default: "false"
        type: boolean
      target_branch:
        description: "Branch to commit improvements to (default: repo default branch)"
        required: false
        default: ""

permissions:
  contents: write
  issues: write

jobs:
  evolve:
    name: "Autonomous Evolution Cycle"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # Use a PAT when set (allows pushing through branch-protection rules),
          # otherwise fall back to the default GITHUB_TOKEN.
          token: ${{ secrets.EVOLUTION_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.target_branch || github.ref_name || github.event.repository.default_branch }}
          # Fetch full history so the push succeeds even after a shallow clone.
          fetch-depth: 0

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # ── 3. Run the evolution agent ────────────────────────────────────────
      - name: Run Autonomous Evolution Agent
        id: agent
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          EVOLUTION_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          # Pass an empty string when fix_type == 'auto' so the agent uses
          # its own priority-based selection logic.
          EVOLUTION_FIX_TYPE: ${{ (inputs.fix_type != 'auto' && inputs.fix_type) || '' }}
        run: python nibblebots/autonomous_evolution_agent.py

      # ── 4. Commit and push ────────────────────────────────────────────────
      #    Only runs if the agent actually wrote a change.
      - name: Commit and push improvement
        if: steps.agent.outputs.changed_file != ''
        run: |
          git config user.name  "niblit-evolution[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage only the changed file (keeps the diff minimal and focused)
          git add "${{ steps.agent.outputs.changed_file }}"

          # Commit using the message generated by the agent
          git commit -m "${{ steps.agent.outputs.commit_msg }}"

          # Push to the same branch that was checked out
          git push

      # ── 5. Report outcome ─────────────────────────────────────────────────
      - name: Report outcome
        if: always()
        run: |
          if [ -n "${{ steps.agent.outputs.changed_file }}" ]; then
            echo "✅ Committed: ${{ steps.agent.outputs.commit_msg }}"
          else
            echo "ℹ️  No change committed this cycle (no fixable issues found or dry-run mode)."
          fi
