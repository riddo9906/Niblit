name: "🧬 Niblit: Autonomous Evolution Agent"

# Phase 16 evolution agent.  On every run it:
#   1. Scans all Python files in the repository.
#   2. Queries GitHub Actions API for recent failures to identify priority files
#      AND maps failure patterns to fix types (Phase 16 failure→fix layer).
#   3. Classifies raw issues into SemanticIssues (semantic_engine.py).
#   4. Scores the expected impact of each fix (impact_engine.py).
#   5. Builds a ranked, gated EvolutionPlan (evolution_planner.py).
#   6. Lane 1 — Intelligent: applies up to EVOLUTION_MAX_FIXES validated fixes.
#   7. Lane 2 — Bulk (Phase 16): applies trailing_whitespace / double_blank_lines /
#      eof_newline fixes at scale (up to EVOLUTION_BULK_MAX_FIXES files), bypassing
#      the semantic pipeline for near-zero-risk cosmetic cleanup.
#   8. Instead of auto-pushing, opens a detailed GitHub issue with the full diff
#      so the team can review and decide whether to apply the improvement manually.
#
# Phase 16 fix catalogue (priority order):
#   Lane 1 (intelligent):
#     1. bare_except         — `except:` -> `except Exception:`
#     2. bare_except_pass    — silent `except...pass` -> + `noqa: BLE001` annotation
#   Lane 2 (bulk low-risk):
#     3. trailing_whitespace — strip trailing spaces/tabs from lines
#     4. double_blank_lines  — collapse 3+ consecutive blank lines to 2
#     5. eof_newline         — add missing terminal newline
#
# Schedule: Daily at 03:00 UTC
# Manual:   workflow_dispatch with fix_type, dry_run, max_fixes, risk_threshold,
#           confidence_min, bulk_max_fixes, bulk_lane, target_branch

on:
  schedule:
    - cron: "0 3 * * *"    # Daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      fix_type:
        description: >
          Force a specific fix type (or "auto" for priority-based selection).
          Options: auto | bare_except | bare_except_pass | trailing_whitespace
                   | double_blank_lines | eof_newline
        required: false
        default: "auto"
      max_fixes:
        description: "Maximum number of files to fix per run (default: 5)"
        required: false
        default: "5"
      risk_threshold:
        description: "Min net_score to apply a fix (default: 0.05)"
        required: false
        default: "0.05"
      confidence_min:
        description: "Min confidence to apply a fix (default: 0.60)"
        required: false
        default: "0.60"
      dry_run:
        description: "Dry run -- print proposed changes without committing"
        required: false
        default: "false"
        type: boolean
      target_branch:
        description: "Branch to commit improvements to (default: repo default branch)"
        required: false
        default: ""
      bulk_max_fixes:
        description: "Maximum files to fix in the bulk low-risk lane (default: 50)"
        required: false
        default: "50"
      bulk_lane:
        description: "Enable the bulk low-risk execution lane (trailing whitespace, blank lines, EOF)"
        required: false
        default: "true"
        type: boolean

permissions:
  contents: read    # read repo files during scan (no longer pushes)
  issues: write     # create detailed evolution-proposal issues for manual review
  actions: read     # query Actions API for failure-driven priority + outcome

concurrency:
  group: niblit-autonomous-evolution-${{ github.ref }}
  cancel-in-progress: false

jobs:
  evolve:
    name: "Autonomous Evolution Cycle"
    runs-on: ubuntu-latest

    steps:
      # -- 1. Checkout --------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          token: ${{ secrets.EVOLUTION_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.target_branch || github.ref_name || github.event.repository.default_branch }}
          fetch-depth: 0

      # -- 2. Python setup ---------------------------------------------------
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # -- 3. Run evolution agent (Phase 3) ----------------------------------
      - name: Run Autonomous Evolution Agent (Phase 3)
        id: agent
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVOLUTION_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          EVOLUTION_MAX_FIXES: ${{ inputs.max_fixes || '5' }}
          EVOLUTION_RISK_THRESHOLD: ${{ inputs.risk_threshold || '0.05' }}
          EVOLUTION_CONFIDENCE_MIN: ${{ inputs.confidence_min || '0.60' }}
          EVOLUTION_FIX_TYPE: ${{ (inputs.fix_type != 'auto' && inputs.fix_type) || '' }}
          EVOLUTION_COMMIT_MSG_FILE: /tmp/niblit_commit_msg.txt
          EVOLUTION_CHANGED_FILES_FILE: /tmp/niblit_changed_files.txt
          EVOLUTION_BULK_MAX_FIXES: ${{ inputs.bulk_max_fixes || '50' }}
          EVOLUTION_BULK_LANE: ${{ inputs.bulk_lane != 'false' && 'true' || 'false' }}
        run: python nibblebots/autonomous_evolution_agent.py

      # -- 4. Create GitHub Issue with proposed improvements ------------------
      #    Instead of auto-pushing, opens a detailed issue so the team can
      #    review the diff and decide whether to apply the improvement manually.
      - name: Create issue with proposed improvements
        id: create_issue
        if: steps.agent.outputs.changed_files != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "niblit-evolution[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage changed files so we can capture an accurate diff
          while IFS= read -r f; do
            [ -n "$f" ] && git add -- "$f"
          done < /tmp/niblit_changed_files.txt

          # Capture all detail needed for the issue body
          COMMIT_MSG=$(cat /tmp/niblit_commit_msg.txt 2>/dev/null || echo "(unavailable)")
          CHANGED_FILES=$(cat /tmp/niblit_changed_files.txt 2>/dev/null || echo "(none)")
          DIFF_STAT=$(git diff --cached --stat 2>/dev/null || echo "(none)")
          # Cap the full diff at 500 lines to stay within GitHub's issue body limit
          DIFF_PATCH=$(git diff --cached 2>/dev/null | head -n 500 || echo "(none)")
          DIFF_TOTAL=$(git diff --cached 2>/dev/null | wc -l || echo "0")
          DIFF_TRUNCATED=""
          if [ "$DIFF_TOTAL" -gt 500 ] 2>/dev/null; then
            DIFF_TRUNCATED="⚠️ Diff truncated at 500 lines (full diff has ${DIFF_TOTAL} lines). See the workflow run for the complete patch."
          fi
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          # Build issue body into a file (avoids shell quoting pitfalls with
          # multi-line content that contains backticks and special characters)
          {
            echo "## Niblit Evolution Proposal"
            echo ""
            echo "**Proposed by:** niblit-evolution[bot]"
            echo "**Run date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
            echo "**Workflow run:** [Run #${{ github.run_number }}](${RUN_URL})"
            echo ""
            echo "---"
            echo ""
            echo "## Proposed Commit Message"
            echo ""
            echo '```'
            echo "$COMMIT_MSG"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "## Files Proposed for Change"
            echo ""
            echo '```'
            echo "$CHANGED_FILES"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "## Diff Summary"
            echo ""
            echo '```'
            echo "$DIFF_STAT"
            echo '```'
            echo ""
            echo "## Full Diff (first 500 lines)"
            echo ""
            if [ -n "$DIFF_TRUNCATED" ]; then
              echo "> $DIFF_TRUNCATED"
              echo ""
            fi
            echo '```diff'
            echo "$DIFF_PATCH"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "> **To apply:** Review the diff above. If the improvement is worth it,"
            echo "> apply the patch manually, or check out the workflow run artifacts and"
            echo "> cherry-pick the change."
            echo ">"
            echo "> **To dismiss:** Close this issue without merging."
          } > /tmp/niblit_issue_body.md

          ISSUE_TITLE="[Evolution Proposal] ${{ steps.agent.outputs.commit_subject }}"

          # Create the issue; try with label first, fall back without if the
          # label doesn't exist in this repo yet.
          LABEL_ERR=$( gh issue create \
            --title "$ISSUE_TITLE" \
            --body-file /tmp/niblit_issue_body.md \
            --label "evolution-proposal" \
          2>&1 ) \
          || {
            echo "ℹ️  Could not create issue with label (will retry without label): $LABEL_ERR"
            gh issue create \
              --title "$ISSUE_TITLE" \
              --body-file /tmp/niblit_issue_body.md
          }

          # Restore workspace to a clean state — do NOT leave uncommitted changes
          git restore --staged . 2>/dev/null || true
          git restore . 2>/dev/null || true

      # -- 5. Report outcome --------------------------------------------------
      - name: Report outcome
        if: always()
        run: |
          if [ -n "${{ steps.agent.outputs.changed_files }}" ]; then
            echo "📋 Evolution issue created for manual review: ${{ steps.agent.outputs.commit_subject }}"
          else
            echo "ℹ️  No improvements found (nothing to fix or dry-run mode)."
          fi

      - name: Emit structured governance output
        if: always()
        run: |
          python - <<'PY'
          import json
          from pathlib import Path
          from nibblebots.workflow_governance_helpers import build_workflow_output

          findings = ["evolution_cycle_completed"]
          proposals = ["manual_governance_review_required_for_architecture_changes"]
          payload = build_workflow_output(
            workflow_name="niblit-autonomous-evolution",
            findings=findings,
            proposals=proposals,
            governance_impact="high",
            schema_impact="medium",
            runtime_impact="medium",
            federation_impact="low",
            confidence=0.72,
          )
          Path("workflow-governance-output.json").write_text(json.dumps(payload, indent=2), encoding="utf-8")
          print(json.dumps(payload, indent=2))
          PY

      - name: Upload structured output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: niblit-autonomous-evolution-governance-output
          path: workflow-governance-output.json
          retention-days: 14
