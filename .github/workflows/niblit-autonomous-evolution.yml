name: "🧬 Niblit: Autonomous Evolution Agent"

# Phase 2 evolution agent.  On every run it:
#   1. Scans EVERY Python file in the repository (378+ files).
#   2. Queries GitHub Actions API for recent failures to identify priority files
#      (failure-driven evolution — broken code gets fixed first).
#   3. Finds up to EVOLUTION_MAX_FIXES files with the same highest-priority issue.
#   4. Applies all fixes, validates each with py_compile.
#   5. Commits with an enriched message: subject + reason + impact + per-file list.
#
# Phase 2 fix catalogue (priority order):
#   1. bare_except         — `except:` → `except Exception:`
#   2. bare_except_pass    — silent `except…pass` → + `noqa: BLE001` annotation
#   3. trailing_whitespace — strip trailing spaces/tabs from lines
#   4. double_blank_lines  — collapse 3+ consecutive blank lines to 2
#   5. eof_newline         — add missing terminal newline
#
# Schedule: Daily at 03:00 UTC
# Manual:   workflow_dispatch with fix_type, dry_run, max_fixes, target_branch

on:
  schedule:
    - cron: "0 3 * * *"    # Daily at 03:00 UTC
  workflow_dispatch:
    inputs:
      fix_type:
        description: >
          Force a specific fix type (or "auto" for priority-based selection).
          Options: auto | bare_except | bare_except_pass | trailing_whitespace
                   | double_blank_lines | eof_newline
        required: false
        default: "auto"
      max_fixes:
        description: "Maximum number of files to fix per run (default: 5)"
        required: false
        default: "5"
      dry_run:
        description: "Dry run — print proposed changes without committing"
        required: false
        default: "false"
        type: boolean
      target_branch:
        description: "Branch to commit improvements to (default: repo default branch)"
        required: false
        default: ""

permissions:
  contents: write   # push improvement commits
  issues: write     # reserved for future issue-creation fallback
  actions: read     # query Actions API for failure-driven priority scan

jobs:
  evolve:
    name: "Autonomous Evolution Cycle"
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # PAT override allows pushing through branch-protection rules.
          token: ${{ secrets.EVOLUTION_BOT_TOKEN || secrets.GITHUB_TOKEN }}
          ref: ${{ inputs.target_branch || github.ref_name || github.event.repository.default_branch }}
          fetch-depth: 0

      # ── 2. Python setup ───────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      # ── 3. Run evolution agent ────────────────────────────────────────────
      - name: Run Autonomous Evolution Agent (Phase 2)
        id: agent
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          EVOLUTION_DRY_RUN: ${{ inputs.dry_run || 'false' }}
          EVOLUTION_MAX_FIXES: ${{ inputs.max_fixes || '5' }}
          # Pass empty string when fix_type == 'auto' so the agent uses its
          # own priority-based selection logic.
          EVOLUTION_FIX_TYPE: ${{ (inputs.fix_type != 'auto' && inputs.fix_type) || '' }}
          EVOLUTION_COMMIT_MSG_FILE: /tmp/niblit_commit_msg.txt
          EVOLUTION_CHANGED_FILES_FILE: /tmp/niblit_changed_files.txt
        run: python nibblebots/autonomous_evolution_agent.py

      # ── 4. Commit and push ────────────────────────────────────────────────
      #    The agent writes two temp files:
      #      /tmp/niblit_changed_files.txt  — newline-separated relative paths
      #      /tmp/niblit_commit_msg.txt     — enriched commit message
      #    Using temp files avoids multiline-string interpolation pitfalls in
      #    GitHub Actions expressions.
      - name: Commit and push improvements
        if: steps.agent.outputs.changed_files != ''
        run: |
          git config user.name  "niblit-evolution[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Stage every file listed by the agent (one per line)
          while IFS= read -r f; do
            [ -n "$f" ] && git add "$f"
          done < /tmp/niblit_changed_files.txt

          # Commit using the enriched message written by the agent
          git commit -F /tmp/niblit_commit_msg.txt

          git push

      # ── 5. Report outcome ─────────────────────────────────────────────────
      - name: Report outcome
        if: always()
        run: |
          if [ -n "${{ steps.agent.outputs.changed_files }}" ]; then
            echo "✅ ${{ steps.agent.outputs.commit_subject }}"
          else
            echo "ℹ️  No changes committed (nothing to fix or dry-run mode)."
          fi
