repos:
  # ── Code formatting ─────────────────────────────────────────────────────────
  - repo: https://github.com/psf/black
    rev: 24.3.0
    hooks:
      - id: black
        language_version: python3
        args: ["--line-length=120"]
        exclude: "^(build/|dist/|__pycache__/|chat_logs/)"

  # ── Linting / import sorting ─────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: ["--fix", "--exit-non-zero-on-fix"]
        exclude: "^(build/|dist/|chat_logs/)"
      - id: ruff-format

  # ── Basic file hygiene ────────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        exclude: "^chat_logs/"
      - id: end-of-file-fixer
        exclude: "^(chat_logs/|.*\\.db$|.*\\.jsonl$|.*\\.key$)"
      - id: check-yaml
      - id: check-toml
      - id: check-json
        exclude: "^(.*\\.env\\..*|local_llm\\.db)"
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: "^chat_logs/"
      - id: debug-statements

  # ── Security ──────────────────────────────────────────────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: "^(\\.env\\.example|\\.env\\.local|.*\\.key$)"

default_language_version:
  python: python3

ci:
  autofix_commit_msg: "chore: pre-commit auto-fixes"
  autoupdate_commit_msg: "chore: pre-commit hook updates"
  skip: []
