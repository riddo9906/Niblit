# fly.toml app configuration file generated for niblit on 2026-04-23T16:11:32Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'niblit'
primary_region = 'iad'
kill_signal = 'SIGTERM'
kill_timeout = '1m0s'
swap_size_mb = 512

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'rolling'

[env]
  ALE_CHECKPOINT_PATH = '/data/ale_state.json'
  ALPACA_PAPER = 'true'
  APP_ENV = 'production'
  FUSED_MEMORY_DB_PATH = '/data/niblit_fused.sqlite'
  LEAN_WORKSPACE = '/data/lean_workspace'
  NIBLIT_BRAIN_MODE = 'balanced'
  NIBLIT_DATA_DIR = '/data'
  NIBLIT_DB_PATH = '/data/niblit.db'
  NIBLIT_GAME_LOG_PATH = '/data/niblit_game_log.jsonl'
  NIBLIT_GAME_STATE_PATH = '/data/niblit_game_state.json'
  NIBLIT_GGUF_BACKEND = 'http'
  NIBLIT_GGUF_MODEL_PATH = '/data/model.gguf'
  NIBLIT_LLAMA_SERVER_PORT = '8000'
  NIBLIT_LLAMA_SERVER_TIMEOUT = '300'
  NIBLIT_LLAMA_SERVER_URL = 'http://0.0.0.0:8000'
  NIBLIT_LLM_MODEL = 'moonshotai/Kimi-K2-Instruct-0905'
  NIBLIT_LLM_PROVIDER = 'qwen'
  NIBLIT_MEMORY_PATH = '/data/niblit_memory.json'
  OANDA_ENVIRONMENT = 'practice'
  PORT = '8080'
  PYTHON_VERSION = '3.12'

[processes]
  web = '/app/start.sh'

[[mounts]]
  source = 'niblit_data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['web']

  [http_service.concurrency]
    type = 'requests'
    hard_limit = 50
    soft_limit = 25

  [[http_service.checks]]
    interval = '15s'
    timeout = '10s'
    grace_period = '20s'
    method = 'GET'
    path = '/health'
    protocol = 'http'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
